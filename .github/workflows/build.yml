name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Unzip project
        run: unzip Zumbale.zip

      - name: Install Capacitor Android
        run: |
          cd Zumbale
          npm install
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd Zumbale/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zumbale-apk
          path: Zumbale/android/app/build/outputs/apk/debug/app-debug.apk
