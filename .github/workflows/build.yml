name: Build APK
on: 
 push:
   branches:
     - main
jobs:
  build:
    runs-on: ubuntu-latest
steps:
     - name: Checkout
       uses: actions/checkout@v4
- name: Setup Node
        uses: actions/setup-node@v4
        with:
           nodde-version: 18
- name: Create www
        run: |
          npm install
          npm install @capacitor/core
@capacitor/cli @capacitor/android

           
     
